# ZAB Metadata Service Configuration
server.port=8081
spring.application.name=zab-metadata-service

# ZAB Cluster Configuration
zab.cluster.nodes=metadata-1,metadata-2,metadata-3
zab.cluster.ports=8081,8082,8083

# Metadata service URL (for gateway to connect to)
metadata.service.url=http://localhost:8081

# Logging configuration
logging.level.com.example.demo.consensus=DEBUG
logging.level.com.example.demo.metadata=DEBUG
logging.level.org.springframework.web=DEBUG

# Management endpoints
management.endpoints.web.exposure.include=health,info,metrics,cluster
management.endpoint.health.show-details=always

# ZAB specific settings
zab.election.timeout=5000
zab.heartbeat.interval=1000
zab.quorum.size=2




